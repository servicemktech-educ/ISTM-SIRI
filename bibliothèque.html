<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISTM</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6fb;
  color: #333;
  transition: 0.3s;
}

body.dark {
  background: #0f172a;
  color: #f1f5f9;
}

header {
background: url('bun.jpg') no-repeat center center;
  background-size: cover;
  color: white;
  padding: 18px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.topbar {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 10px;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #004080;
  color: white;
  transition: 0.3s;
}

button:hover {
  background: #0066cc;
}

#search {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 2px solid #004080;
  margin: 15px 0;
}

.web-search {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.web-search input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: 2px solid #004080;
}

.filters {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.filter-btn {
  background: #e2e8f0;
  color: #333;
}

.filter-btn.active {
  background: #004080;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
  border-left: 4px solid #004080;
}

body.dark .card {
  background: #1e293b;
}

.card:hover {
  transform: translateY(-5px);
}

.card a {
  display: inline-block;
  margin-top: 10px;
  padding: 6px 12px;
  background: #004080;
  color: white;
  text-decoration: none;
  border-radius: 6px;
}

h3 {
  margin: 20px 0 10px;
  color: #004080;
}
</style>
</head>

<body>

<header>
📚 Bibliothèque Médicale
</header>

<div class="container">

<div class="topbar">
  <button onclick="toggleDark()">🌙 Mode</button>
</div>

<!-- 🔎 Recherche locale -->
<input type="text" id="search" placeholder="Rechercher dans la bibliothèque locale">

<!-- 🌐 Recherche Internet -->
<h3>🌐 Recherchle en ligne</h3>
<div class="web-search">
  <input type="text" id="webSearch" placeholder="Recherche sur internet">
  <button onclick="searchGoogle()">Google</button>
  <button onclick="searchScholar()">Scholar</button>
  <button onclick="searchPubMed()">PubMed</button>
  <button onclick="searchAI()">IA</button>
</div>

<!-- 🎯 FILTRE -->
<div class="filters">
  <button class="filter-btn active" onclick="filterYear('all')">Tous</button>
  <button class="filter-btn" onclick="filterYear('1')">BAC1</button>
  <button class="filter-btn" onclick="filterYear('2')">BAC2</button>
  <button class="filter-btn" onclick="filterYear('3')">BAC3</button>
</div>
<!-- BAC1-->
<div class="year year-1">
<h3>BAC1</h3>
<div class="card">
  Anatomie humaine <br>
  <a href="pdf/anatomie.pdf" target="_blank">Lire</a>
  <a href="pdf/anatomie.pdf" download>Télécharger</a>
</div>

<div class="card">
  Physiologie <br>
  <a href="pdf/physiologie.pdf" target="_blank">Lire</a>
  <a href="pdf/physiologie.pdf" download>Télécharger</a>
</div>

<!-- BAC2 -->
<div class="year year-2""">
<h3>BAC2</h3>
<div class="grid">
  <div class="card">Soins Physiologie <br>
  <a href="pdf/physiologie.pdf" target="_blank">Lire</a>
  <a href="pdf/physiologie.pdf" download>Télécharger</a>
</div>
</div>

<!-- BAC3 -->
<div class="year year-3">
<h3>BAC3</h3>
<div class="grid">
  <div class="card">Santé Physiologie <br>
  <a href="pdf/physiologie.pdf" target="_blank">Lire</a>
  <a href="pdf/physiologie.pdf" download>Télécharger</a></div>
</div>
</div>

</div>

<script>

/* 🔎 Recherche locale */
const search = document.getElementById("search");
const cards = document.querySelectorAll(".card");

search.addEventListener("input", function () {
  let value = this.value.toLowerCase();

  cards.forEach(card => {
    card.style.display = card.textContent.toLowerCase().includes(value)
      ? "block"
      : "none";
  });
});

/* 🌐 Recherche Internet */
function searchGoogle() {
  let query = document.getElementById("webSearch").value;
  window.open("https://www.google.com/search?q=" + encodeURIComponent(query), "_blank");
}

function searchScholar() {
  let query = document.getElementById("webSearch").value;
  window.open("https://scholar.google.com/scholar?q=" + encodeURIComponent(query), "_blank");
}

function searchPubMed() {
  let query = document.getElementById("webSearch").value;
  window.open("https://pubmed.ncbi.nlm.nih.gov/?term=" + encodeURIComponent(query), "_blank");
}

/* 🤖 Recherche IA */
function searchAI() {
  let query = document.getElementById("webSearch").value;

  if (!query) return;

  window.open(
    "https://chat.openai.com/?q=" + encodeURIComponent(query),
    "_blank"
  );
}

/* 🎯 Filtre */
function filterYear(year) {
  let sections = document.querySelectorAll(".year");

  sections.forEach(sec => {
    if (year === "all") {
      sec.style.display = "block";
    } else {
      sec.style.display = sec.classList.contains("year-" + year)
        ? "block"
        : "none";
    }
  });

  document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
}

/* 🌙 Mode sombre */
function toggleDark() {
  document.body.classList.toggle("dark");
}

</script>

</body>
</html>
